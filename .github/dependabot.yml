# Conservative config: group each ecosystem into ONE grouped PR and keep open-PR
# limits low, so Dependabot cannot spam the branch-protected main with many
# separate PRs that each run (and can redden) the 9 required status checks.
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    groups:
      python-deps:
        patterns: ["*"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    groups:
      actions:
        patterns: ["*"]
