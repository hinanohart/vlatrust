name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    # CPU-only core math + perturbation algebra (no GPU, no sim, no LLM).
    name: core (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run core test suite
        run: pytest -q

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip && pip install "ruff>=0.4"
      - run: ruff check src tests
      - run: ruff format --check src tests

  build:
    name: build (sdist+wheel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - run: pip install dist/*.whl && python -c "import vlatrust; print(vlatrust.__version__)"

  honest-marketing:
    # Mechanical firewall against ship-and-yank: no random in production paths,
    # no undisclaimed synthetic numbers, no overclaim tokens. Finalized at S7.
    name: honest-marketing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: bash scripts/honest_marketing_check.sh
      - name: Self-test the firewall (detector must trip on a planted fixture)
        run: bash scripts/honest_marketing_check.sh --selftest
